services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hubspot_app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: hubspot_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hubspot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: